<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCT NINJA X - Secure Pairing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3131;
            --bg-dark: #0f0f0f;
            --card-bg: rgba(25, 25, 25, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 49, 49, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 49, 49, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Professional Glass Card */
        .box {
            position: relative;
            width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle Avatar Branding */
        .avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(255, 49, 49, 0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Modern Input Fields */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            margin-top: 8px;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 49, 49, 0.05);
        }

        /* Refined Buttons */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #submit {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 49, 49, 0.3);
        }

        #submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 49, 49, 0.4);
            filter: brightness(1.1);
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
        }

        .actions button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: #fff;
        }

        /* Output Code Section */
        #pair {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* Status Indicator */
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #4CAF50;
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/dct-dula/database/72aa5d4b1f23483de55304b7fc56a33f0ffea903/ninja-samurai-fighter-asian-epic-rock-royalty-free-music-128-ytshorts.savetube.me.mp3" type="audio/mpeg">
</audio>

<div class="box">
    <div class="avatar">
        <img src="https://raw.githubusercontent.com/dct-dula/database/refs/heads/main/WhatsApp%20Image%202026-04-18%20at%2022.32.51.jpeg" alt="Logo">
    </div>

    <h2>NINJA X MD</h2>
    <p>Pair your device via phone number</p>

    <div class="input-group">
        <label>WhatsApp Number</label>
        <input id="number" type="tel" placeholder="e.g. 947XXXXXXXX" autocomplete="off">
    </div>

    <button id="submit">GENERATE PAIRING CODE</button>

    <div id="pair">
        <span style="color: var(--text-dim); font-size: 13px; letter-spacing: 0;">Waiting for input...</span>
    </div>

    <div class="actions">
        <button id="joinBtn">COMMUNITY</button>
        <button id="clearBtn">RESET</button>
    </div>
    
    <div style="margin-top: 20px; font-size: 10px; color: #444;">
        SECURE END-TO-END ENCRYPTION ACTIVE
    </div>
</div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
<audio id="successSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>

<script>
const bgMusic = document.getElementById("bgMusic");
bgMusic.volume = 0.2;

document.body.addEventListener("click", () => {
    bgMusic.play().catch(()=>{});
}, { once: true });

const clickSound=document.getElementById("clickSound");
const successSound=document.getElementById("successSound");

function playClick(){
    clickSound.currentTime=0;
    clickSound.play();
}

function playSuccess(){
    successSound.currentTime=0;
    successSound.play();
}

function typeText(el,text,speed=30){
    el.innerHTML="";
    let i=0;
    function typing(){
        if(i<text.length){
            el.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,speed);
        }
    }
    typing();
}

const pair=document.getElementById("pair");
const num=document.getElementById("number");

document.getElementById("submit").onclick=async()=>{
    playClick();

    if(!num.value || num.value.length < 10){
        typeText(pair,"⚠️ Invalid phone format", 30);
        return;
    }

    pair.innerHTML = '<span style="font-size: 13px; color: #aaa;">Connecting to server...</span>';

    try {
        let res = await fetch(`/code?number=${num.value}`);
        let data = await res.json();

        setTimeout(() => {
            if(data.code) {
                pair.innerHTML = `<span style="color:var(--primary); font-weight:bold;">${data.code}</span>`;
                playSuccess();
            } else {
                typeText(pair, "Error: Service Unavailable", 30);
            }
        }, 1200);

    } catch {
        typeText(pair, "Connection Failed", 30);
    }
};

document.getElementById("clearBtn").onclick=()=>{
    playClick();
    num.value="";
    pair.innerHTML='<span style="color: var(--text-dim); font-size: 13px; letter-spacing: 0;">Waiting for input...</span>';
};

document.getElementById("joinBtn").onclick=()=>{
    playClick();
    window.open("https://chat.whatsapp.com/G7qafxv7mGrH3LVGuDMUHw","_blank");
};

num.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        document.getElementById("submit").click();
    }
});
</script>

</body>
</html>
