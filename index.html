<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCT NINJA X MD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Orbitron:wght@700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at center, #1a0000 0%, #050000 70%, #000 100%);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow-x:hidden;
}

/* PARTICLES */
.particles span{
  position:absolute;
  width:5px;
  height:5px;
  background: #ff0000;
  border-radius:50%;
  box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0); opacity:0}
  20%{opacity:1; transform:scale(1)}
  100%{transform:translateY(-10vh) scale(0.5); opacity:0}
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  z-index: 10;
}

/* MAIN BOX */
.box{
  position: relative;
  background:rgba(10,0,0,0.85);
  border:1px solid rgba(255,0,0,0.4);
  backdrop-filter:blur(15px);
  border-radius:25px;
  padding:70px 25px 30px;
  text-align:center;
  box-shadow: 0 0 30px rgba(255,0,0,0.15);
  animation: fade 1s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

/* AVATAR */
.avatar{
  position:absolute;
  top:-50px;
  left:50%;
  transform:translateX(-50%);
  width:100px;
  height:100px;
  border-radius:50%;
  overflow:hidden;
  border: 2px solid #ff0000;
  box-shadow: 0 0 25px #ff0000;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TABS */
.tab-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  background: rgba(0,0,0,0.4);
  padding: 5px;
  border-radius: 12px;
}

.tab-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: #888;
  cursor: pointer;
  font-weight: 600;
  font-size: 11px;
  border-radius: 8px;
  transition: 0.3s;
  font-family: 'Orbitron', sans-serif;
}

.tab-btn.active {
  background: #ff0000;
  color: #000;
  box-shadow: 0 0 15px rgba(255,0,0,0.5);
}

/* UI ELEMENTS */
h2{
  font-family: 'Orbitron', sans-serif;
  color: #ff0000;
  margin-bottom:15px;
  font-size: 1.4rem;
  text-shadow: 0 0 10px #ff0000;
}

input, select {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #0a0000;
  color: #fff;
  border: 1px solid #440000;
  border-radius: 10px;
  outline: none;
  text-align: center;
}

input:focus {
  border-color: #ff0000;
  box-shadow: 0 0 15px rgba(255,0,0,0.3);
}

/* 📟 PAIR CODE GENERATE BOX THEME */
#pair {
  margin-top: 20px;
  padding: 15px;
  min-height: 65px;
  background: rgba(255, 0, 0, 0.05);
  border: 2px solid #ff0000;
  border-radius: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: #fff;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.2);
  animation: pulseBorder 2s infinite;
}

#pair::before {
  content: "";
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,0,0,0.2), transparent);
  animation: scanLine 3s infinite;
}

@keyframes scanLine { 0% { left: -100%; } 100% { left: 100%; } }
@keyframes pulseBorder {
  0%, 100% { border-color: rgba(255,0,0,0.4); }
  50% { border-color: rgba(255,0,0,1); box-shadow: 0 0 20px rgba(255,0,0,0.3); }
}

/* BUTTONS */
button.main-btn {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #8b0000, #ff0000);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.actions button {
  flex: 1;
  background: transparent;
  border: 1px solid #ff0000;
  color: #ff0000;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}

/* SETTINGS CARD */
.settings-card {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
  background: rgba(255, 0, 0, 0.05);
  border: 1px dashed rgba(255, 0, 0, 0.4);
  padding: 12px;
  border-radius: 15px;
  text-decoration: none;
  color: #fff;
  font-size: 12px;
  transition: 0.3s;
}

.settings-card:hover { background: rgba(255, 0, 0, 0.15); border-style: solid; }
.settings-card i { color: #ff0000; animation: rotate 4s linear infinite; }
@keyframes rotate { from {transform:rotate(0deg)} to {transform:rotate(360deg)} }

.hidden { display: none; }
</style>
</head>

<body>

<audio id="bgMusic" autoplay loop>
  <source src="https://raw.githubusercontent.com/dct-dula/database/72aa5d4b1f23483de55304b7fc56a33f0ffea903/ninja-samurai-fighter-asian-epic-rock-royalty-free-music-128-ytshorts.savetube.me.mp3" type="audio/mpeg">
</audio>

<div class="particles" id="particles"></div>

<div class="container">
  <div class="box">
    <div class="avatar">
      <img src="https://raw.githubusercontent.com/dct-dula/database/refs/heads/main/WhatsApp%20Image%202026-04-18%20at%2022.32.51.jpeg">
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="pTab" onclick="switchMode('pair')">PAIRING</button>
      <button class="tab-btn" id="qTab" onclick="switchMode('qr')">QR SCAN</button>
    </div>

    <div id="pairUI">
      <h2>NINJA PAIRING</h2>
      <input id="number" type="tel" placeholder="947XXXXXXXX">
      <button id="submit" class="main-btn">GET CODE</button>
    </div>

    <div id="qrUI" class="hidden">
      <h2>QR DEPLOY</h2>
      <button class="main-btn">GENERATE QR</button>
    </div>

    <div id="pair">READY...</div>

    <div class="actions">
      <button id="joinBtn">JOIN GROUP</button>
      <button id="clearBtn">CLEAR</button>
    </div>
  </div>

  <a href="setting.html" class="settings-card">
    <i class="fas fa-microchip"></i>
    <span>BOT SETTINGS CONTROL</span>
  </a>
</div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
<audio id="successSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>

<script>
const bgMusic = document.getElementById("bgMusic");
bgMusic.volume = 0.3;
document.body.addEventListener("click", () => { bgMusic.play().catch(()=>{}); }, { once: true });

/* PARTICLES */
const container=document.getElementById("particles");
for(let i=0;i<50;i++){
  let s=document.createElement("span");
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(3+Math.random()*5)+"s";
  container.appendChild(s);
}

/* SOUNDS */
const clickSound=document.getElementById("clickSound");
const successSound=document.getElementById("successSound");
function playClick(){ clickSound.currentTime=0; clickSound.play(); }
function playSuccess(){ successSound.currentTime=0; successSound.play(); }

/* TAB SWITCHING */
function switchMode(mode) {
  playClick();
  const pairUI = document.getElementById('pairUI');
  const qrUI = document.getElementById('qrUI');
  const pTab = document.getElementById('pTab');
  const qTab = document.getElementById('qTab');
  if(mode === 'pair') {
    pairUI.classList.remove('hidden'); qrUI.classList.add('hidden');
    pTab.classList.add('active'); qTab.classList.remove('active');
  } else {
    pairUI.classList.add('hidden'); qrUI.classList.remove('hidden');
    qTab.classList.add('active'); pTab.classList.remove('active');
  }
}

/* TYPE EFFECT */
function typeText(el,text,speed=40){
  el.innerHTML="";
  let i=0;
  function typing(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}

/* LOGIC */
const pairResult=document.getElementById("pair");
const numInput=document.getElementById("number");

document.getElementById("submit").onclick=async()=>{
  playClick();
  if(!numInput.value || numInput.value.length<10){
    typeText(pairResult,"Invalid number",30);
    return;
  }

  typeText(pairResult,"Initializing ninja system...",25);

  try{
    let res=await fetch(`/code?number=${numInput.value}`);
    let data=await res.json();

    setTimeout(()=>{ typeText(pairResult,"Generating secure code...",25); }, 800);

    setTimeout(()=>{
      pairResult.innerHTML=`<span style="color:#ff0000; letter-spacing:4px; font-weight:bold">${data.code || "ERROR"}</span>`;
      playSuccess();
    }, 1600);
  } catch {
    typeText(pairResult,"Server Error",30);
  }
};

document.getElementById("clearBtn").onclick=()=>{
  playClick();
  numInput.value="";
  pairResult.innerHTML="READY...";
};

document.getElementById("joinBtn").onclick=()=>{
  playClick();
  window.open("https://chat.whatsapp.com/G7qafxv7mGrH3LVGuDMUHw","_blank");
};
</script>

</body>
</html>
