<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED QUEEN | NINJA X MD</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0000;
            --glass: rgba(15, 15, 15, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #000;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                              url('https://wallpaperaccess.com/full/2454628.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- STAGE 1: HOME PAGE CONTENT --- */
        #home-screen {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            transition: 0.6s all ease;
        }

        .hero-title {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-main {
            padding: 18px 45px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        }

        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.5);
            filter: brightness(1.2);
        }

        /* --- STAGE 2: PAIRING INTERFACE (HIDDEN BY DEFAULT) --- */
        #pairing-screen {
            display: none;
            opacity: 0;
            transform: translateY(30px);
            transition: 0.6s all ease;
        }

        .box {
            width: 420px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 60px 35px 40px;
            text-align: center;
            position: relative;
        }

        .avatar {
            width: 110px;
            height: 110px;
            margin: -115px auto 20px;
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid var(--accent);
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.3);
            background: #000;
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        h2 { font-size: 26px; margin-bottom: 10px; letter-spacing: 1px; }
        
        .sub-text { color: #888; font-size: 14px; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); background: rgba(255,0,0,0.05); }

        #submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        #pair {
            margin-top: 25px;
            font-size: 28px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 6px;
            min-height: 40px;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .actions button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: #777;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .actions button:hover { color: #fff; border-color: #fff; }

        /* Animation Classes */
        .hidden { display: none !important; }
        .visible { display: block !important; opacity: 1 !important; transform: translateY(0) !important; }

    </style>
</head>
<body>

    <div id="home-screen">
        <h1 class="hero-title">NINJA X MD</h1>
        <p class="hero-desc">The most advanced WhatsApp automation system. Lightweight, secure, and built for performance.</p>
        <button class="btn-main" id="startConnect">CONNECT MINIBOT</button>
    </div>

    <div id="pairing-screen">
        <div class="box">
            <div class="avatar">
                <img src="https://raw.githubusercontent.com/dct-dula/database/refs/heads/main/WhatsApp%20Image%202026-04-18%20at%2022.32.51.jpeg">
            </div>
            <h2>LINK DEVICE</h2>
            <p class="sub-text">Enter your number to receive pairing code</p>
            
            <input id="number" type="tel" placeholder="+94 7X XXX XXXX">
            <button id="submit">GET PAIRING CODE</button>
            
            <div id="pair"></div>

            <div class="actions">
                <button id="joinBtn">COMMUNITY</button>
                <button id="clearBtn">RESET</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop src="https://raw.githubusercontent.com/dct-dula/database/72aa5d4b1f23483de55304b7fc56a33f0ffea903/ninja-samurai-fighter-asian-epic-rock-royalty-free-music-128-ytshorts.savetube.me.mp3"></audio>
    <audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
    <audio id="successSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>

    <script>
        const home = document.getElementById('home-screen');
        const pairScreen = document.getElementById('pairing-screen');
        const bgMusic = document.getElementById("bgMusic");
        const clickSound = document.getElementById("clickSound");
        const successSound = document.getElementById("successSound");

        bgMusic.volume = 0.2;

        // Transition Logic
        document.getElementById('startConnect').onclick = () => {
            clickSound.play();
            bgMusic.play().catch(()=>{});
            
            // Fade out home
            home.style.opacity = '0';
            home.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                home.classList.add('hidden');
                pairScreen.classList.add('visible');
            }, 600);
        };

        // Existing Pairing Logic
        const pairDiv = document.getElementById("pair");
        const numInput = document.getElementById("number");

        document.getElementById("submit").onclick = async () => {
            clickSound.play();
            if(!numInput.value || numInput.value.length < 10){
                pairDiv.innerHTML = "<span style='font-size:14px; letter-spacing:0;'>Invalid Phone Number</span>";
                return;
            }

            pairDiv.innerHTML = "<span style='font-size:14px; letter-spacing:0; color:#555;'>Linking...</span>";

            try {
                let res = await fetch(`/code?number=${numInput.value}`);
                let data = await res.json();
                setTimeout(() => {
                    pairDiv.innerText = data.code || "ERROR";
                    successSound.play();
                }, 1000);
            } catch {
                pairDiv.innerHTML = "<span style='font-size:14px; letter-spacing:0;'>Server Error</span>";
            }
        };

        document.getElementById("clearBtn").onclick = () => {
            clickSound.play();
            numInput.value = "";
            pairDiv.innerHTML = "";
        };

        document.getElementById("joinBtn").onclick = () => {
            clickSound.play();
            window.open("https://chat.whatsapp.com/G7qafxv7mGrH3LVGuDMUHw","_blank");
        };
    </script>
</body>
</html>
