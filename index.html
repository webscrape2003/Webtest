<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCT NINJA X MD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  /* Darker, more atmospheric background */
  background: radial-gradient(circle at center, #1a0000 0%, #050000 70%, #000 100%);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* PARTICLES - Enhanced with Glow */
.particles span{
  position:absolute;
  width:5px;
  height:5px;
  background: #ff0000;
  border-radius:50%;
  box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0); opacity:0}
  20%{opacity:1; transform:scale(1)}
  100%{transform:translateY(-10vh) scale(0.5); opacity:0}
}

/* BOX - Added Breathing Glow Animation */
.box{
  position: relative;
  width:360px;
  background:rgba(10,0,0,0.85);
  border:1px solid rgba(255,0,0,0.5);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:80px 20px 30px;
  text-align:center;
  box-shadow: 0 0 20px rgba(255,0,0,0.2);
  animation: boxGlow 3s ease-in-out infinite alternate, fade 1s ease;
}

@keyframes boxGlow {
  from { box-shadow: 0 0 15px rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.4); }
  to { box-shadow: 0 0 40px rgba(255,0,0,0.5); border-color: rgba(255,0,0,0.8); }
}

@keyframes fade{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

/* AVATAR - Animated Neon Ring */
.avatar{
  position:absolute;
  top:-60px;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:120px;
  border-radius:50%;
  overflow:hidden;
  border: 2px solid #ff0000;
  box-shadow: 0 0 25px #ff0000;
  z-index: 10;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition: 0.5s;
}

.avatar:hover img {
  transform: scale(1.1);
}

/* TEXT - Sci-fi Ninja Style */
h2{
  font-family: 'Orbitron', sans-serif;
  color: #ff0000;
  margin-bottom:5px;
  text-shadow: 0 0 10px #ff0000;
  letter-spacing: 1px;
}

p{
  color:#bbb;
  font-size:13px;
}

/* INPUT - Red Scanline Style */
input{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#0a0000;
  color:#fff;
  border:1px solid #440000;
  transition:.3s;
  text-align: center;
}

input:focus{
  border-color:#ff0000;
  box-shadow:0 0 15px #ff0000;
  background: #110000;
}

/* BUTTONS - High Intensity Red */
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg, #8b0000, #ff0000);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 4px 15px rgba(255,0,0,0.3);
}

button:hover{
  background: #ff0000;
  box-shadow: 0 0 25px #ff0000;
  transform:scale(1.03);
}

/* ACTIONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.actions button{
  flex:1;
  background: transparent;
  border: 1px solid #ff0000;
  color: #ff0000;
}

.actions button:hover {
  background: #ff0000;
  color: #000;
}

/* INFO */
#pair{
  margin-top:12px;
  font-weight:bold;
  min-height:20px;
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 8px rgba(255,0,0,0.8);
}
</style>
</head>

<body>

<audio id="bgMusic" autoplay loop>
  <source src="https://raw.githubusercontent.com/dct-dula/database/72aa5d4b1f23483de55304b7fc56a33f0ffea903/ninja-samurai-fighter-asian-epic-rock-royalty-free-music-128-ytshorts.savetube.me.mp3" type="audio/mpeg">
</audio>

<div class="particles" id="particles"></div>

<div class="box">
  <div class="avatar">
    <img src="https://raw.githubusercontent.com/dct-dula/database/refs/heads/main/WhatsApp%20Image%202026-04-18%20at%2022.32.51.jpeg">
  </div>

  <h2>DCT NINJA X MD</h2>
  <p>Enter WhatsApp number with country code</p>

  <input id="number" type="tel" placeholder="947XXXXXXXX">

  <button id="submit">GET CODE</button>

  <div id="pair"></div>

  <div class="actions">
    <button id="joinBtn">JOIN</button>
    <button id="clearBtn">CLEAR</button>
  </div>
</div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
<audio id="successSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>

<script>
/* 🔊 AUTO PLAY FIX + VOLUME */
const bgMusic = document.getElementById("bgMusic");
bgMusic.volume = 0.3;

// Some browsers block autoplay → start on first click
document.body.addEventListener("click", () => {
  bgMusic.play().catch(()=>{});
}, { once: true });

/* PARTICLES */
const container=document.getElementById("particles");
for(let i=0;i<50;i++){
  let s=document.createElement("span");
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(3+Math.random()*5)+"s";
  container.appendChild(s);
}

/* SOUND */
const clickSound=document.getElementById("clickSound");
const successSound=document.getElementById("successSound");

function playClick(){
  clickSound.currentTime=0;
  clickSound.play();
}

function playSuccess(){
  successSound.currentTime=0;
  successSound.play();
}

/* TYPE EFFECT */
function typeText(el,text,speed=40){
  el.innerHTML="";
  let i=0;
  function typing(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}

/* LOGIC */
const pair=document.getElementById("pair");
const num=document.getElementById("number");

document.getElementById("submit").onclick=async()=>{
  playClick();

  if(!num.value || num.value.length<10){
    typeText(pair,"Invalid number",30);
    return;
  }

  typeText(pair,"Initializing ninja system...",25);

  try{
    let res=await fetch(`/code?number=${num.value}`);
    let data=await res.json();

    setTimeout(()=>{
      typeText(pair,"Generating secure code...",25);
    }, 800);

    setTimeout(()=>{
      pair.innerHTML=`<span style="color:red">CODE: ${data.code || "ERROR"}</span>`;
      playSuccess();
    }, 1600);

  }catch{
    typeText(pair,"Server Error",30);
  }
};

document.getElementById("clearBtn").onclick=()=>{
  playClick();
  num.value="";
  pair.innerHTML="";
};

document.getElementById("joinBtn").onclick=()=>{
  playClick();
  window.open("https://chat.whatsapp.com/G7qafxv7mGrH3LVGuDMUHw","_blank");
};

/* ENTER KEY */
num.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    document.getElementById("submit").click();
  }
});
</script>

</body>
</html>
