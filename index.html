<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BWM XMD Deploy</title>
    <style>
        body { background: #0b1120; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #151c2c; padding: 20px; border-radius: 12px; border: 1px solid #1e293b; }
        .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .xd { color: #10b981; font-weight: bold; }
        .input-box { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        .deploy-btn { width: 100%; padding: 15px; background: #ef4444; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .deploy-btn:disabled { background: #334155; cursor: wait; }
        #status { margin-top: 15px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <div class="head">
        <div><strong>IBRAHIM</strong> ADAMS</div>
        <div class="xd">50 XD</div>
    </div>

    <div class="input-box">
        <label>Device Mode</label>
        <input type="text" id="mode" value="Android">
    </div>

    <div class="input-box">
        <label>Owner Number</label>
        <input type="text" id="owner" placeholder="254712345678">
    </div>

    <div class="input-box">
        <label>Session ID</label>
        <textarea id="session" rows="4" placeholder="Paste session id here"></textarea>
    </div>

    <button class="deploy-btn" id="btn" onclick="run()">DEPLOY NOW</button>
    <div id="status"></div>
</div>

<script>
    async function run() {
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        
        const data = {
            deviceMode: document.getElementById('mode').value,
            ownerNumber: document.getElementById('owner').value,
            sessionId: document.getElementById('session').value
        };

        btn.disabled = true;
        btn.innerText = "Deploying...";
        status.innerText = "Connecting to Heroku...";

        try {
            const res = await fetch('/api/deploy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if(result.success) {
                status.innerHTML = `<span style="color:#10b981">Deployed!</span><br><a href="${result.url}" target="_blank" style="color:white">View in Heroku Dashboard</a>`;
            } else {
                throw new Error(result.error);
            }
        } catch (e) {
            status.style.color = "#ef4444";
            status.innerText = "Error: " + e.message;
            btn.disabled = false;
            btn.innerText = "DEPLOY NOW";
        }
    }
</script>

</body>
</html>
